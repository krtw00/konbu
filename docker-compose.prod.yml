services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: konbu
      POSTGRES_USER: konbu
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./sql/migrations/0001_initial.up.sql:/docker-entrypoint-initdb.d/01_initial.sql:ro
      - ./sql/migrations/0002_auth_password.up.sql:/docker-entrypoint-initdb.d/02_auth_password.sql:ro
      - ./sql/migrations/0003_recurring_events.up.sql:/docker-entrypoint-initdb.d/03_recurring_events.sql:ro
      - ./sql/migrations/0004_tool_category.up.sql:/docker-entrypoint-initdb.d/04_tool_category.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U konbu"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  server:
    build:
      context: .
      dockerfile: docker/Dockerfile
    environment:
      DATABASE_URL: postgres://konbu:${POSTGRES_PASSWORD}@postgres:5432/konbu?sslmode=disable
      PORT: "8080"
      SESSION_SECRET: ${SESSION_SECRET}
      BASE_URL: ${BASE_URL}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_PRICE_MONTHLY: ${STRIPE_PRICE_MONTHLY:-}
      STRIPE_PRICE_YEARLY: ${STRIPE_PRICE_YEARLY:-}
    depends_on:
      postgres:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.konbu.rule=Host(`${KONBU_DOMAIN}`)"
      - "traefik.http.routers.konbu.entrypoints=websecure"
      - "traefik.http.routers.konbu.tls.certresolver=letsencrypt"
      - "traefik.http.services.konbu.loadbalancer.server.port=8080"
      - "traefik.http.routers.konbu-http.rule=Host(`${KONBU_DOMAIN}`)"
      - "traefik.http.routers.konbu-http.entrypoints=web"
      - "traefik.http.routers.konbu-http.middlewares=redirect-to-https"
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"
    networks:
      - default
      - web
    restart: unless-stopped

networks:
  web:
    external: true

volumes:
  pgdata:

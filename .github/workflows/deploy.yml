name: Deploy to Cloud Run and Cloudflare

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: konbu-deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      GOOGLE_CLOUD_PROJECT: ${{ vars.GOOGLE_CLOUD_PROJECT || 'oauthsetting-484201' }}
      GOOGLE_CLOUD_REGION: ${{ vars.GOOGLE_CLOUD_REGION || 'asia-northeast1' }}
      ARTIFACT_REGISTRY_REPOSITORY: ${{ vars.ARTIFACT_REGISTRY_REPOSITORY || 'apps' }}
      CLOUD_RUN_SERVICE: ${{ vars.CLOUD_RUN_SERVICE || 'konbu' }}
      CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID || '7a4bdd42ddce5841858a7d6fe6119430' }}
      RUNTIME_ENV_FILE: deploy/google/konbu.runtime.env

    steps:
      - uses: actions/checkout@v5

      - name: Write runtime env
        run: |
          cat <<'EOF' > "$RUNTIME_ENV_FILE"
          ${{ secrets.KONBU_RUNTIME_ENV }}
          EOF

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}
          create_credentials_file: true

      - uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GOOGLE_CLOUD_PROJECT }}

      - name: Deploy to Cloud Run
        run: bash scripts/deploy-cloudrun-konbu.sh

      - name: Deploy Cloudflare edge
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: bash scripts/deploy-cloudflare-konbu-cloud.sh

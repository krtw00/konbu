name: Deploy to Cloud Run

on:
  push:
    branches: [main, staging]
  workflow_dispatch:

concurrency:
  group: konbu-deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    if: github.ref == 'refs/heads/main' || (github.ref == 'refs/heads/staging' && vars.ENABLE_STAGING == 'true')
    runs-on: ubuntu-latest
    env:
      GOOGLE_CLOUD_PROJECT: ${{ vars.GOOGLE_CLOUD_PROJECT || 'oauthsetting-484201' }}
      GOOGLE_CLOUD_REGION: ${{ vars.GOOGLE_CLOUD_REGION || 'asia-northeast1' }}
      ARTIFACT_REGISTRY_REPOSITORY: ${{ vars.ARTIFACT_REGISTRY_REPOSITORY || 'apps' }}
      CLOUD_RUN_SERVICE: ${{ github.ref == 'refs/heads/staging' && (vars.STAGING_CLOUD_RUN_SERVICE || 'konbu-staging') || (vars.CLOUD_RUN_SERVICE || 'konbu') }}
      RUNTIME_ENV_FILE: ${{ github.ref == 'refs/heads/staging' && 'deploy/google/konbu.staging.runtime.env' || 'deploy/google/konbu.runtime.env' }}
      FIREBASE_HOSTING_SITE: ${{ github.ref == 'refs/heads/staging' && (vars.STAGING_FIREBASE_HOSTING_SITE || 'konbu-cloud-staging') || (vars.FIREBASE_HOSTING_SITE || 'konbu-cloud') }}

    steps:
      - uses: actions/checkout@v5

      - name: Write runtime env
        run: |
          cat <<'EOF' > "$RUNTIME_ENV_FILE"
          ${{ github.ref == 'refs/heads/staging' && secrets.KONBU_STAGING_RUNTIME_ENV || secrets.KONBU_RUNTIME_ENV }}
          EOF

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}
          create_credentials_file: true

      - uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GOOGLE_CLOUD_PROJECT }}

      - name: Deploy to Cloud Run
        run: bash scripts/deploy-cloudrun-konbu.sh

      - name: Deploy Firebase Hosting proxy
        run: GOOGLE_CLOUD_PROJECT=${{ env.GOOGLE_CLOUD_PROJECT }} bash scripts/deploy-firebase-konbu.sh
        env:
          FIREBASE_HOSTING_SITE: ${{ env.FIREBASE_HOSTING_SITE }}
          FIREBASE_CLOUD_RUN_SERVICE: ${{ env.CLOUD_RUN_SERVICE }}

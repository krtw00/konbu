<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>konbu</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body class="theme-a">
  <div id="app">

    <!-- Theme Switcher (top-right floating) -->
    <div class="theme-switcher" id="theme-switcher">
      <span class="theme-label">Design:</span>
      <button class="theme-btn active" data-theme="theme-a" title="A: Light Workspace">A</button>
      <button class="theme-btn" data-theme="theme-b" title="B: Warm Notion-like">B</button>
      <button class="theme-btn" data-theme="theme-c" title="C: Classic Portal">C</button>
      <button class="theme-btn" data-theme="theme-d" title="D: Dark Minimal">D</button>
    </div>

    <!-- Header -->
    <header class="header">
      <div class="header-inner">
        <h1 class="logo"><span class="logo-mark">K</span>konbu</h1>
        <div class="header-search">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          <input type="text" id="global-search" placeholder="Search...">
        </div>
        <div class="header-right">
          <span class="header-date" id="header-date"></span>
          <span class="header-user" id="header-user"></span>
        </div>
      </div>
    </header>

    <!-- Portal -->
    <main class="portal">
      <div class="grid">

        <!-- Schedule -->
        <section class="widget w-schedule">
          <div class="w-head">
            <h2><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>Schedule</h2>
            <button class="w-add" data-action="new-event">+</button>
          </div>
          <div class="w-body">
            <div id="mini-cal"></div>
            <div id="event-list"></div>
          </div>
        </section>

        <!-- ToDo -->
        <section class="widget w-todo">
          <div class="w-head">
            <h2><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="m9 12 2 2 4-4"/></svg>ToDo <span class="count" id="todo-count">0</span></h2>
            <button class="w-add" data-action="new-todo">+</button>
          </div>
          <div class="w-body">
            <div class="chips" id="todo-chips">
              <button class="chip on" data-f="open">Open</button>
              <button class="chip" data-f="done">Done</button>
              <button class="chip" data-f="all">All</button>
            </div>
            <div id="todo-list"></div>
          </div>
        </section>

        <!-- Memos -->
        <section class="widget w-memos">
          <div class="w-head">
            <h2><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14,2 14,8 20,8"/></svg>Memos <span class="count" id="memo-count">0</span></h2>
            <button class="w-add" data-action="new-memo">+</button>
          </div>
          <div class="w-body" id="memo-list"></div>
        </section>

        <!-- Tools -->
        <section class="widget w-tools">
          <div class="w-head">
            <h2><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>Tools</h2>
            <button class="w-add" data-action="new-tool">+</button>
          </div>
          <div class="w-body" id="tool-grid"></div>
        </section>

        <!-- Tags -->
        <section class="widget w-tags">
          <div class="w-head"><h2><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2 2 7l10 5 10-5-10-5Z"/><path d="m2 17 10 5 10-5"/><path d="m2 12 10 5 10-5"/></svg>Tags</h2></div>
          <div class="w-body" id="tag-list"></div>
        </section>

        <!-- Quick -->
        <section class="widget w-quick">
          <div class="w-head"><h2><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Quick Input</h2></div>
          <div class="w-body">
            <input type="text" class="quick-in" id="quick-in" placeholder="Type and Enter to add memo...">
            <div class="chips" style="margin-top:6px">
              <button class="chip on" data-q="memo">Memo</button>
              <button class="chip" data-q="todo">ToDo</button>
            </div>
          </div>
        </section>

      </div>
    </main>

    <!-- Modal -->
    <div class="modal-bg hidden" id="modal-bg">
      <div class="modal">
        <div class="modal-head"><h3 id="modal-title"></h3><button class="modal-x" id="modal-x">&times;</button></div>
        <div class="modal-body" id="modal-body"></div>
      </div>
    </div>
  </div>
  <script src="/static/app.js"></script>
</body>
</html>

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: konbu
      POSTGRES_USER: konbu
      POSTGRES_PASSWORD: konbu
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./sql/migrations/0001_initial.up.sql:/docker-entrypoint-initdb.d/01_initial.sql:ro
      - ./sql/migrations/0002_auth_password.up.sql:/docker-entrypoint-initdb.d/02_auth_password.sql:ro
      - ./sql/migrations/0003_recurring_events.up.sql:/docker-entrypoint-initdb.d/03_recurring_events.sql:ro
      - ./sql/migrations/0004_tool_category.up.sql:/docker-entrypoint-initdb.d/04_tool_category.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U konbu"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: .
      dockerfile: docker/Dockerfile
    environment:
      DATABASE_URL: postgres://konbu:konbu@postgres:5432/konbu?sslmode=disable
      PORT: "8080"
      SESSION_SECRET: konbu-dev-secret-change-me
      DEV_USER: dev@local
      BASE_URL: ${BASE_URL:-http://localhost:8080}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_PRICE_MONTHLY: ${STRIPE_PRICE_MONTHLY:-}
      STRIPE_PRICE_YEARLY: ${STRIPE_PRICE_YEARLY:-}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:

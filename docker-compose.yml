services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: konbu
      POSTGRES_USER: konbu
      POSTGRES_PASSWORD: konbu
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./sql/migrations/0001_initial.up.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U konbu"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: .
      dockerfile: docker/Dockerfile
    environment:
      DATABASE_URL: postgres://konbu:konbu@postgres:5432/konbu?sslmode=disable
      PORT: "8080"
      DEV_USER: dev@local
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
